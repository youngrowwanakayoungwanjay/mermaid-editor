<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Mermaid 圖表工具</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      background: #f8fafc;
      color: #1e293b;
      transition: background 0.2s, color 0.2s;
    }
    .dark body { background: #0f172a; color: #e2e8f0; }

    /* ── Top bar ── */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid rgba(0,0,0,.08);
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .dark #topbar { background: #1e293b; border-color: rgba(255,255,255,.08); }

    #topbar h1 {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #topbar h1 svg { opacity: .7; }

    .topbar-actions { display: flex; align-items: center; gap: 8px; }

    .btn-ghost {
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid rgba(0,0,0,.12);
      background: transparent;
      font-size: 13px;
      cursor: pointer;
      color: inherit;
      transition: background .15s;
      white-space: nowrap;
    }
    .dark .btn-ghost { border-color: rgba(255,255,255,.15); }
    .btn-ghost:hover { background: rgba(0,0,0,.06); }
    .dark .btn-ghost:hover { background: rgba(255,255,255,.08); }

    /* ── Main layout ── */
    #main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      height: calc(100vh - 57px);
    }
    @media (max-width: 768px) {
      #main { grid-template-columns: 1fr; grid-template-rows: 45vh 1fr; height: auto; }
    }

    /* ── Editor pane ── */
    #editor-pane {
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(0,0,0,.08);
    }
    .dark #editor-pane { border-color: rgba(255,255,255,.08); }

    .pane-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: #64748b;
      border-bottom: 1px solid rgba(0,0,0,.06);
      background: rgba(0,0,0,.015);
      flex-shrink: 0;
    }
    .dark .pane-header {
      color: #94a3b8;
      border-color: rgba(255,255,255,.06);
      background: rgba(255,255,255,.02);
    }

    #mermaid-code {
      flex: 1;
      width: 100%;
      padding: 16px;
      font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
      font-size: 13.5px;
      line-height: 1.65;
      border: none;
      outline: none;
      resize: none;
      background: #f8fafc;
      color: #1e293b;
      tab-size: 2;
    }
    .dark #mermaid-code { background: #0f172a; color: #e2e8f0; }

    .editor-footer {
      padding: 8px 16px;
      font-size: 12px;
      color: #94a3b8;
      border-top: 1px solid rgba(0,0,0,.06);
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .dark .editor-footer { border-color: rgba(255,255,255,.06); }
    #status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
      transition: background .2s;
    }
    #status-dot.error { background: #ef4444; }
    #status-dot.loading { background: #f59e0b; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── Preview pane ── */
    #preview-pane {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #diagram-wrap {
      flex: 1;
      overflow: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      cursor: zoom-in;
    }

    #diagram svg {
      max-width: 100%;
      height: auto;
      display: block;
    }

    .error-msg {
      color: #ef4444;
      font-size: 13px;
      line-height: 1.6;
      font-family: ui-monospace, monospace;
      background: rgba(239,68,68,.06);
      border: 1px solid rgba(239,68,68,.2);
      border-radius: 8px;
      padding: 16px;
      max-width: 400px;
    }

    /* ── Download toolbar ── */
    #download-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-top: 1px solid rgba(0,0,0,.08);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .dark #download-bar { border-color: rgba(255,255,255,.08); }

    #filename-input {
      flex: 1;
      min-width: 120px;
      max-width: 220px;
      padding: 7px 12px;
      border-radius: 8px;
      border: 1px solid rgba(0,0,0,.15);
      background: #fff;
      color: #1e293b;
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
    }
    .dark #filename-input {
      background: #1e293b;
      border-color: rgba(255,255,255,.15);
      color: #e2e8f0;
    }
    #filename-input:focus { border-color: #6366f1; }

    /* Scale selector */
    .scale-group {
      display: flex;
      border: 1px solid rgba(0,0,0,.15);
      border-radius: 8px;
      overflow: hidden;
    }
    .dark .scale-group { border-color: rgba(255,255,255,.15); }
    .scale-btn {
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 500;
      background: transparent;
      border: none;
      border-right: 1px solid rgba(0,0,0,.1);
      cursor: pointer;
      color: #64748b;
      transition: background .15s, color .15s;
    }
    .dark .scale-btn { color: #94a3b8; border-right-color: rgba(255,255,255,.1); }
    .scale-btn:last-child { border-right: none; }
    .scale-btn.active, .scale-btn:hover {
      background: #6366f1;
      color: #fff;
    }
    .scale-label {
      font-size: 12px;
      color: #94a3b8;
      padding: 0 4px;
      display: flex;
      align-items: center;
    }

    /* Download buttons */
    .btn-dl {
      padding: 7px 16px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity .15s, transform .1s;
    }
    .btn-dl:active { transform: scale(.97); }
    .btn-png { background: #6366f1; color: #fff; }
    .btn-png:hover { opacity: .9; }
    .btn-svg { background: transparent; border: 1px solid rgba(0,0,0,.15); color: inherit; }
    .dark .btn-svg { border-color: rgba(255,255,255,.2); }
    .btn-svg:hover { background: rgba(0,0,0,.05); }
    .dark .btn-svg:hover { background: rgba(255,255,255,.06); }

    /* ── Fullscreen overlay ── */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.85);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 32px;
      cursor: zoom-out;
    }
    #overlay.show { display: flex; }
    #overlay-inner {
      max-width: 95vw;
      max-height: 90vh;
      overflow: auto;
      cursor: default;
    }
    #overlay-inner svg {
      display: block;
      max-width: 100%;
      height: auto;
    }
    #overlay-close {
      position: fixed;
      top: 20px;
      right: 24px;
      color: #fff;
      font-size: 32px;
      cursor: pointer;
      opacity: .7;
      line-height: 1;
      transition: opacity .15s;
      background: none;
      border: none;
      padding: 4px;
    }
    #overlay-close:hover { opacity: 1; }

    /* Keyboard shortcut hint */
    kbd {
      display: inline-block;
      padding: 1px 5px;
      border: 1px solid rgba(0,0,0,.2);
      border-radius: 4px;
      font-size: 11px;
      font-family: inherit;
      background: rgba(0,0,0,.05);
      color: #64748b;
    }
    .dark kbd { border-color: rgba(255,255,255,.2); background: rgba(255,255,255,.05); color: #94a3b8; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: #1e293b;
      color: #fff;
      padding: 10px 20px;
      border-radius: 100px;
      font-size: 13px;
      opacity: 0;
      transition: opacity .2s, transform .2s;
      pointer-events: none;
      z-index: 9999;
      white-space: nowrap;
    }
    .dark #toast { background: #f1f5f9; color: #1e293b; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <h1>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="3"/><path d="M8 12h8M12 8v8"/>
    </svg>
    <span id="lbl-title">Mermaid 圖表工具</span>
  </h1>
  <div class="topbar-actions">
    <button class="btn-ghost" onclick="toggleLang()" id="btn-lang">English</button>
    <button class="btn-ghost" onclick="toggleTheme()" id="btn-theme">☀ 亮色</button>
    <button class="btn-ghost" onclick="openFullscreen()" id="btn-fs">⛶ 全螢幕</button>
  </div>
</div>

<!-- Main -->
<div id="main">
  <!-- Editor -->
  <div id="editor-pane">
    <div class="pane-header">
      <span id="lbl-editor">語法編輯器</span>
      <button class="btn-ghost" style="padding:3px 10px;font-size:12px;" onclick="copyCode()" id="btn-copy">複製</button>
    </div>
    <textarea id="mermaid-code" spellcheck="false">graph TD
    A[開始] --> B{判斷條件}
    B -- 是 --> C[執行動作 1]
    B -- 否 --> D[執行動作 2]
    C --> E[結束]
    D --> E</textarea>
    <div class="editor-footer">
      <div id="status-dot"></div>
      <span id="status-text">就緒</span>
    </div>
  </div>

  <!-- Preview -->
  <div id="preview-pane">
    <div class="pane-header">
      <span id="lbl-preview">預覽</span>
      <span style="font-size:11px;opacity:.6;" id="lbl-click-hint">點擊放大</span>
    </div>
    <div id="diagram-wrap" onclick="openFullscreen()">
      <div id="diagram"></div>
    </div>
    <div id="download-bar">
      <input type="text" id="filename-input" id="lbl-filename-ph" placeholder="檔名（選填）">
      <span class="scale-label" id="lbl-scale">解析度</span>
      <div class="scale-group">
        <button class="scale-btn active" data-scale="2" onclick="setScale(this)">2×</button>
        <button class="scale-btn" data-scale="3" onclick="setScale(this)">3×</button>
        <button class="scale-btn" data-scale="4" onclick="setScale(this)">4×</button>
      </div>
      <button class="btn-dl btn-svg" onclick="downloadSVG()" id="btn-svg">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        SVG
      </button>
      <button class="btn-dl btn-png" onclick="downloadPNG()" id="btn-png">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span id="lbl-dl-png">下載 PNG</span>
      </button>
    </div>
  </div>
</div>

<!-- Fullscreen overlay -->
<div id="overlay" onclick="handleOverlayClick(event)">
  <button id="overlay-close" onclick="closeFullscreen()">✕</button>
  <div id="overlay-inner"></div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  const $ = id => document.getElementById(id);
  const codeEl = $('mermaid-code');
  const diagramEl = $('diagram');

  let currentLang = localStorage.getItem('lang') || 'zh';
  let currentTheme = localStorage.getItem('theme') || 'dark';
  let currentScale = 2;
  let renderTimer = null;

  const T = {
    zh: {
      title: 'Mermaid 圖表工具',
      editor: '語法編輯器',
      preview: '預覽',
      clickHint: '點擊放大',
      copy: '複製',
      copied: '已複製！',
      filenamePh: '檔名（選填）',
      scale: '解析度',
      dlPng: '下載 PNG',
      btnFs: '⛶ 全螢幕',
      btnLang: 'English',
      btnThemeLight: '☀ 亮色',
      btnThemeDark: '🌙 暗色',
      statusReady: '就緒',
      statusOk: '渲染成功',
      statusError: '語法錯誤',
      statusLoading: '渲染中…',
    },
    en: {
      title: 'Mermaid Chart Tool',
      editor: 'Syntax Editor',
      preview: 'Preview',
      clickHint: 'Click to zoom',
      copy: 'Copy',
      copied: 'Copied!',
      filenamePh: 'Filename (optional)',
      scale: 'Resolution',
      dlPng: 'Download PNG',
      btnFs: '⛶ Fullscreen',
      btnLang: '中文',
      btnThemeLight: '☀ Light',
      btnThemeDark: '🌙 Dark',
      statusReady: 'Ready',
      statusOk: 'Rendered',
      statusError: 'Syntax error',
      statusLoading: 'Rendering…',
    }
  };

  function t(key) { return T[currentLang][key]; }

  function applyLang() {
    document.documentElement.lang = currentLang === 'zh' ? 'zh-TW' : 'en';
    $('page-title').textContent = t('title');
    $('lbl-title').textContent = t('title');
    $('lbl-editor').textContent = t('editor');
    $('lbl-preview').textContent = t('preview');
    $('lbl-click-hint').textContent = t('clickHint');
    $('btn-copy').textContent = t('copy');
    $('filename-input').placeholder = t('filenamePh');
    $('lbl-scale').textContent = t('scale');
    $('lbl-dl-png').textContent = t('dlPng');
    $('btn-fs').textContent = t('btnFs');
    $('btn-lang').textContent = t('btnLang');
    $('btn-theme').textContent = currentTheme === 'dark' ? t('btnThemeLight') : t('btnThemeDark');
    setStatus('ready');
  }

  function toggleLang() {
    currentLang = currentLang === 'zh' ? 'en' : 'zh';
    localStorage.setItem('lang', currentLang);
    applyLang();
  }

  function toggleTheme() {
    currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
    localStorage.setItem('theme', currentTheme);
    document.documentElement.classList.toggle('dark', currentTheme === 'dark');
    applyLang();
    renderDiagram();
  }

  function setStatus(state, msg) {
    const dot = $('status-dot');
    const txt = $('status-text');
    dot.className = '';
    if (state === 'ready') { txt.textContent = t('statusReady'); }
    else if (state === 'ok') { txt.textContent = msg || t('statusOk'); }
    else if (state === 'error') { dot.className = 'error'; txt.textContent = t('statusError'); }
    else if (state === 'loading') { dot.className = 'loading'; txt.textContent = t('statusLoading'); }
  }

  let renderId = 0;
  async function renderDiagram() {
    const code = codeEl.value.trim();
    if (!code) return;

    setStatus('loading');
    const id = ++renderId;

    mermaid.initialize({
      startOnLoad: false,
      theme: currentTheme === 'dark' ? 'dark' : 'default',
      securityLevel: 'loose',
    });

    try {
      const uid = 'mmd-' + Date.now() + '-' + Math.random().toString(36).slice(2);
      const { svg } = await mermaid.render(uid, code);
      if (id !== renderId) return;
      diagramEl.innerHTML = svg;
      setStatus('ok');
    } catch (err) {
      if (id !== renderId) return;
      const clean = (err.message || '')
        .replace(/^Error:\s*/i, '')
        .replace(/mermaid version[\s\S]*/i, '')
        .trim();
      diagramEl.innerHTML = `<div class="error-msg">${clean || 'Unknown error'}</div>`;
      setStatus('error');
    }
  }

  codeEl.addEventListener('input', () => {
    clearTimeout(renderTimer);
    setStatus('loading');
    renderTimer = setTimeout(renderDiagram, 350);
  });

  /* ── Scale ── */
  function setScale(btn) {
    document.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentScale = parseInt(btn.dataset.scale, 10);
  }

  /* ── Copy code ── */
  function copyCode() {
    navigator.clipboard.writeText(codeEl.value).then(() => showToast(t('copied')));
  }

  /* ── Toast ── */
  function showToast(msg) {
    const el = $('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
  }

  /* ── Fullscreen ── */
  function openFullscreen() {
    const svg = diagramEl.querySelector('svg');
    if (!svg) return;
    const clone = svg.cloneNode(true);
    const inner = $('overlay-inner');
    inner.innerHTML = '';
    inner.appendChild(clone);
    $('overlay').classList.add('show');
    document.body.style.overflow = 'hidden';
  }

  function closeFullscreen() {
    $('overlay').classList.remove('show');
    document.body.style.overflow = '';
  }

  function handleOverlayClick(e) {
    if (e.target === $('overlay')) closeFullscreen();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeFullscreen();
  });

  /* ── SVG download ── */
  function downloadSVG() {
    const svg = diagramEl.querySelector('svg');
    if (!svg) { showToast('⚠ 無圖表'); return; }
    const filename = ($('filename-input').value.trim() || 'mermaid_diagram') + '.svg';
    const blob = new Blob([new XMLSerializer().serializeToString(svg)], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
    showToast('SVG 已下載');
  }

  /* ── PNG download (high-res) ── */
  function downloadPNG() {
    const svg = diagramEl.querySelector('svg');
    if (!svg) { showToast('⚠ 無圖表'); return; }

    const filename = ($('filename-input').value.trim() || 'mermaid_diagram') + '.png';
    const scale = currentScale;

    // Get natural SVG dimensions
    const bbox = svg.getBBox ? svg.getBBox() : null;
    const vb = svg.getAttribute('viewBox');
    let w, h;
    if (vb) {
      const parts = vb.split(/[\s,]+/);
      w = parseFloat(parts[2]);
      h = parseFloat(parts[3]);
    } else {
      w = svg.width?.baseVal?.value || svg.clientWidth || 800;
      h = svg.height?.baseVal?.value || svg.clientHeight || 600;
    }

    // Clone & fix for canvas rendering
    const clone = svg.cloneNode(true);
    clone.setAttribute('width', w);
    clone.setAttribute('height', h);
    clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');

    // Inline all computed styles for accurate rendering
    const allEls = clone.querySelectorAll('*');
    const origEls = svg.querySelectorAll('*');
    allEls.forEach((el, i) => {
      try {
        const computed = window.getComputedStyle(origEls[i]);
        ['fill','stroke','stroke-width','font-family','font-size','font-weight'].forEach(prop => {
          const val = computed.getPropertyValue(prop);
          if (val) el.style[prop] = val;
        });
      } catch(e) {}
    });

    const svgStr = new XMLSerializer().serializeToString(clone);
    const dataUrl = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgStr)));

    const canvas = document.createElement('canvas');
    canvas.width = Math.round(w * scale);
    canvas.height = Math.round(h * scale);

    const ctx = canvas.getContext('2d');
    const img = new Image();

    img.onload = () => {
      // Background
      ctx.fillStyle = currentTheme === 'dark' ? '#1e1e2e' : '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
        showToast(`PNG ${scale}× 已下載`);
      }, 'image/png');
    };

    img.onerror = () => showToast('⚠ 匯出失敗，請改用 SVG');
    img.src = dataUrl;
  }

  /* ── Init ── */
  document.documentElement.classList.toggle('dark', currentTheme === 'dark');
  applyLang();
  renderDiagram();
</script>
</body>
</html>
